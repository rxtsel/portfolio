pre-commit:
  piped: true
  jobs:
    - name: eslint
      run: pnpm exec eslint --fix {staged_files}
      glob:
        - "*.{js,mjs,cjs,ts,mts,cts,jsx,tsx,astro}"
      stage_fixed: true

    - name: prettier
      run: pnpm exec prettier --write {staged_files}
      glob:
        - "*.{js,mjs,cjs,ts,mts,cts,jsx,tsx,astro,css,json,jsonc,md,mdx,yml,yaml}"
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
