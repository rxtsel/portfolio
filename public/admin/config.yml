# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: rxtsel/portfolio

i18n:
  structure: multiple_folders
  locales: [en, es]
  default_locale: en
  omit_default_locale_from_preview_path: true

slug:
  encoding: ascii
  clean_accents: true
  trim: true

media_folder: /public/uploads
public_folder: /uploads

# Media provider features
media_libraries:
  default:
    config:
      max_file_size: 1024000
      slugify_filename: true

singletons:
  - name: home
    label: Home
    file: src/content/home/{{locale}}.md
    i18n: true
    fields:
      - { label: Locale, name: locale, widget: hidden, default: "{{locale}}", i18n: true }
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Intro, name: intro, widget: markdown, i18n: true }
      - label: Projects
        name: projects
        widget: list
        i18n: true
        fields:
          - { label: Name, name: name, widget: string, i18n: true }
          - { label: Description, name: description, widget: text, i18n: true }
          - { label: URL, name: href, widget: string, required: false, i18n: duplicate }
          - label: Tags
            name: tags
            widget: list
            required: false
            i18n: duplicate
            field: { label: Tag, name: tag, widget: string }

      - label: Experience
        name: experience
        widget: list
        i18n: true
        fields:
          - { label: Role, name: role, widget: string, i18n: true }
          - { label: Company, name: company, widget: string, i18n: duplicate }
          - { label: Start date, name: startDate, widget: string, i18n: duplicate }
          - { label: End date, name: endDate, widget: string, required: false, i18n: duplicate }
          - label: Highlights
            name: highlights
            widget: list
            required: false
            i18n: true
            field: { label: Highlight, name: highlight, widget: string }

      - label: Stack
        name: stack
        widget: list
        i18n: true
        fields:
          - { label: Tech, name: tech, widget: string, i18n: false }
          - { label: URL, name: href, widget: string, required: false }

      - label: Latest posts
        name: latestPosts
        widget: relation
        collection: blog
        multiple: true
        max: 5
        required: false
        i18n: true
        value_field: "{{locale}}/{{slug}}"
        display_fields: [title]
        search_fields: [title, description]
        filters:
          - field: draft
            values: [false]

      - label: SEO
        name: seo
        widget: object
        i18n: true
        fields:
          - { label: SEO title, name: title, widget: string, required: false, i18n: true }
          - { label: SEO description, name: description, widget: text, required: false, i18n: true }
          - { label: Keywords, name: keywords, widget: string, required: false, i18n: true }

collections:
  - name: blog
    label: Blog
    label_singular: Post
    folder: src/content/blog
    create: true
    i18n: true
    slug: "{{title | localize}}"
    preview_path: /{{locale}}/blog/{{slug}}
    summary: "{{title}} — {{locales}}"
    fields:
      - { label: Locale, name: locale, widget: hidden, default: "{{locale}}", i18n: true }
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Description, name: description, widget: text, i18n: true }
      - {
          label: Publish date,
          name: publishDate,
          widget: datetime,
          date_format: YYYY-MM-DD,
          time_format: false,
          i18n: duplicate,
        }
      - {
          label: Updated date,
          name: updatedDate,
          widget: datetime,
          date_format: YYYY-MM-DD,
          time_format: false,
          required: false,
          i18n: duplicate,
        }
      - { label: Draft, name: draft, widget: boolean, default: true, i18n: duplicate }
      - label: Tags
        name: tags
        widget: list
        required: false
        i18n: true
        field: { label: Tag, name: tag, widget: string }
      - { label: Cover image, name: coverImage, widget: image, required: false, i18n: duplicate }
      - { label: Cover image alt, name: coverImageAlt, widget: string, required: false, i18n: true }
      - label: SEO
        name: seo
        widget: object
        required: false
        i18n: true
        fields:
          - { label: SEO title, name: title, widget: string, required: false, i18n: true }
          - { label: SEO description, name: description, widget: text, required: false, i18n: true }
          - { label: Keywords, name: keywords, widget: string, required: false, i18n: true }

      - { label: Body, name: body, widget: markdown, i18n: true }
